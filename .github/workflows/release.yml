name: release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.20-dev or nightly-20260209)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/modbus-agent-linux-${{ matrix.arch }} \
            ./cmd/main.go

      - name: Generate sha256
        run: |
          cd dist
          sha256sum modbus-agent-linux-${{ matrix.arch }} \
            > modbus-agent-linux-${{ matrix.arch }}.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modbus-agent-linux-${{ matrix.arch }}
          path: |
            dist/modbus-agent-linux-${{ matrix.arch }}
            dist/modbus-agent-linux-${{ matrix.arch }}.sha256

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/**/modbus-agent-linux-*
